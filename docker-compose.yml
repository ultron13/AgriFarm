services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmconnect_dev
      POSTGRES_USER: farmconnect
      POSTGRES_PASSWORD: farmconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "farmconnect"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
