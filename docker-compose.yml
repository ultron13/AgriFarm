services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: farmconnect_dev
      POSTGRES_USER: farmconnect
      POSTGRES_PASSWORD: farmconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "farmconnect"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://farmconnect:farmconnect@postgres:5432/farmconnect_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/server.js"]

  worker:
    build:
      context: ./backend
      target: production
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://farmconnect:farmconnect@postgres:5432/farmconnect_dev
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/worker.js"]

  frontend:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
