## FarmConnect SA — Render Blueprint
## Deploy this repo at https://dashboard.render.com/select-repo
##
## After first deploy, set these secrets in the Render dashboard
## (marked sync: false below):
##   farmconnect-api + farmconnect-worker:
##     OZOW_SITE_CODE, OZOW_PRIVATE_KEY, OZOW_WEBHOOK_SECRET
##     STITCH_CLIENT_ID, STITCH_CLIENT_SECRET, STITCH_WEBHOOK_SECRET
##     CLICKATELL_API_KEY, CLICKATELL_WHATSAPP_NUMBER
##     SENDGRID_API_KEY
##     R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_PUBLIC_URL
##
## Note: Redis (farmconnect-redis) uses the Starter plan ($10/month).
## For a free alternative, replace REDIS_URL with an Upstash Redis URL.

envVarGroups:
  - name: farmconnect-jwt
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: farmconnect-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    # Migrations run on every start — Prisma migrate is idempotent so this is safe.
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - fromGroup: farmconnect-jwt
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farmconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: farmconnect-redis
          type: redis
          property: connectionString
      # Render fromService gives hostname only; code prepends https:// automatically.
      - key: FRONTEND_URL
        fromService:
          name: farmconnect-web
          type: web
          property: host
      - key: API_URL
        fromService:
          name: farmconnect-api
          type: web
          property: host
      - key: OZOW_IS_TEST
        value: "false"
      - key: OZOW_SITE_CODE
        sync: false
      - key: OZOW_PRIVATE_KEY
        sync: false
      - key: OZOW_WEBHOOK_SECRET
        sync: false
      - key: STITCH_CLIENT_ID
        sync: false
      - key: STITCH_CLIENT_SECRET
        sync: false
      - key: STITCH_WEBHOOK_SECRET
        sync: false
      - key: CLICKATELL_API_KEY
        sync: false
      - key: CLICKATELL_WHATSAPP_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: no-reply@farmconnect.co.za
      - key: SENDGRID_FROM_NAME
        value: FarmConnect SA
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: farmconnect-prod
      - key: R2_PUBLIC_URL
        sync: false

  # ── Background Worker ────────────────────────────────────────────────────────
  - type: worker
    name: farmconnect-worker
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/worker.js
    envVars:
      - fromGroup: farmconnect-jwt
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farmconnect-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: farmconnect-redis
          type: redis
          property: connectionString
      - key: CLICKATELL_API_KEY
        sync: false
      - key: CLICKATELL_WHATSAPP_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: no-reply@farmconnect.co.za
      - key: SENDGRID_FROM_NAME
        value: FarmConnect SA
      - key: OZOW_SITE_CODE
        sync: false
      - key: OZOW_PRIVATE_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: farmconnect-prod

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: farmconnect-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Render gives hostname only; api.ts prepends https:// automatically.
      - key: VITE_API_URL
        fromService:
          name: farmconnect-api
          type: web
          property: host

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: farmconnect-db
    plan: free
    region: oregon
    databaseName: farmconnect
    user: farmconnect

  # ── Redis ────────────────────────────────────────────────────────────────────
  - name: farmconnect-redis
    plan: starter
    region: oregon
    ipAllowList: []
